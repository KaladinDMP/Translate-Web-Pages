name: Release

# Manually triggered from the GitHub "Actions" tab.
# You enter the version (e.g. 0.0.6) and it:
#   1. Collects commit messages since the last release tag as the changelog
#   2. Injects a dated changelog entry into release-notes/en.html
#   3. Rewrites the version in manifest.json and package.json
#   4. Commits everything and tags v<version>
#   5. Builds an UNPACKED zip and a PACKED .crx
#   6. Publishes a GitHub Release with the changelog and both assets

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (1-4 dot-separated integers, e.g. 0.0.6)"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+(\.[0-9]+){0,3}$'; then
            echo "::error::'$VERSION' is not a valid extension version. Use 1-4 dot-separated integers, e.g. 0.0.6"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build changelog from commits since last release
        run: |
          # Find the most recent tag; if none exists, use all commits
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "Collecting commits since $PREV_TAG"
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"%s" --no-merges \
              | grep -v '^Release v' || true)
          else
            echo "No previous tag — collecting all commits"
            COMMITS=$(git log --pretty=format:"%s" --no-merges \
              | grep -v '^Release v' || true)
          fi

          if [ -z "$COMMITS" ]; then
            COMMITS="Minor improvements and fixes"
          fi

          echo "--- Changelog preview ---"
          echo "$COMMITS"
          echo "-------------------------"

          # Store for later steps (multiline-safe)
          {
            echo "COMMITS<<__EOF__"
            echo "$COMMITS"
            echo "__EOF__"
          } >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Bump version everywhere
        run: |
          tmp=$(mktemp)
          jq --arg v "$VERSION" '.version = $v' src/manifest.json > "$tmp" && mv "$tmp" src/manifest.json

          tmp=$(mktemp)
          jq --arg v "$VERSION" '.version = $v' package.json > "$tmp" && mv "$tmp" package.json

          echo "manifest.json -> $(jq -r .version src/manifest.json)"
          echo "package.json  -> $(jq -r .version package.json)"

      - name: Inject changelog entry into release-notes/en.html
        run: |
          python3 - <<'PYEOF'
          import os, sys, html
          from datetime import datetime, timezone

          version = os.environ["VERSION"]
          commits = os.environ["COMMITS"]
          today   = datetime.now(timezone.utc).strftime("%Y-%m-%d")

          items = [html.escape(l.strip().lstrip("-").strip())
                   for l in commits.splitlines() if l.strip()]
          if not items:
              items = ["Minor improvements and fixes"]

          li_items = "\n".join(f"        <li>{item}</li>" for item in items)
          new_entry = (
              f'\n    <h3>v{version} — <small style="color:#555;">{today}</small></h3>\n'
              f"    <ul>\n{li_items}\n    </ul>\n"
          )

          path    = "src/options/release-notes/en.html"
          marker  = "<!-- NEW_RELEASE_PLACEHOLDER -->"
          content = open(path).read()
          if marker not in content:
              print(f"ERROR: marker not found in {path}"); sys.exit(1)
          open(path, "w").write(content.replace(marker, marker + new_entry, 1))
          print(f"Injected changelog for v{version} ({today})")
          PYEOF

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add src/manifest.json package.json src/options/release-notes/en.html
            git commit -m "Release v$VERSION"
            git push origin HEAD:"${GITHUB_REF_NAME}"
          fi
          git tag -f "v$VERSION"
          git push -f origin "v$VERSION"

      - name: Install crx3
        run: npm install crx3 --no-save

      - name: Build unpacked zip
        run: |
          mkdir -p dist
          ( cd src && zip -r -X "../dist/TWP-${VERSION}-unpacked.zip" . -x '*.DS_Store' )
          echo "Built dist/TWP-${VERSION}-unpacked.zip"

      - name: Build packed .crx
        env:
          CRX_PRIVATE_KEY: ${{ secrets.CRX_PRIVATE_KEY }}
        run: |
          mkdir -p dist
          if [ -n "$CRX_PRIVATE_KEY" ]; then
            printf '%s' "$CRX_PRIVATE_KEY" > dist/key.pem
            echo "Using CRX_PRIVATE_KEY secret for signing."
          else
            echo "::warning::No CRX_PRIVATE_KEY secret — generating a one-time key. Attach it as the CRX_PRIVATE_KEY secret to keep a stable extension ID."
          fi

          cat > build-crx.js <<'EOF'
          const crx3 = require("crx3");
          const version = process.env.VERSION;
          crx3(["src/manifest.json"], {
            keyPath: "dist/key.pem",
            crxPath: `dist/TWP-${version}.crx`,
          })
            .then(() => console.log("crx built: dist/TWP-" + version + ".crx"))
            .catch((e) => { console.error(e); process.exit(1); });
          EOF
          node build-crx.js
          rm -f build-crx.js

      - name: Prepare release assets
        env:
          CRX_PRIVATE_KEY: ${{ secrets.CRX_PRIVATE_KEY }}
        run: |
          if [ -z "$CRX_PRIVATE_KEY" ] && [ -f dist/key.pem ]; then
            cp dist/key.pem "dist/TWP-${VERSION}-signing-key.pem"
          fi
          rm -f dist/key.pem
          ls -la dist

      - name: Format release body
        run: |
          BULLET_LIST=$(echo "$COMMITS" | sed 's/^/- /')
          {
            echo "RELEASE_BODY<<__EOF__"
            echo "## TWP — Translate Web Pages v${VERSION}"
            echo ""
            echo "### What's changed"
            echo "$BULLET_LIST"
            echo ""
            echo "---"
            echo ""
            echo "### Install"
            echo "- **\`TWP-${VERSION}-unpacked.zip\`** — extract, then *Load unpacked* in Chrome/Edge/Brave (Developer Mode)."
            echo "- **\`TWP-${VERSION}.crx\`** — packed, signed extension."
            echo ""
            echo "> Fork of [FilipePS/Traduzir-paginas-web](https://github.com/FilipePS/Traduzir-paginas-web). MV3 migration by [KaladinDMP](https://github.com/kaladindmp) of ARMGDDN Games."
            echo "__EOF__"
          } >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.event.inputs.version }}"
          name: "TWP v${{ github.event.inputs.version }}"
          prerelease: ${{ github.event.inputs.prerelease }}
          body: ${{ env.RELEASE_BODY }}
          files: |
            dist/TWP-${{ github.event.inputs.version }}-unpacked.zip
            dist/TWP-${{ github.event.inputs.version }}.crx
            dist/TWP-${{ github.event.inputs.version }}-signing-key.pem
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
